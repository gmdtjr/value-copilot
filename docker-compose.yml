# Value Investing Copilot — Docker Compose
# Usage: cp .env.example .env && <fill in API keys> && docker compose up -d

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - vc-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-value_copilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-value_copilot}
      POSTGRES_DB: ${POSTGRES_DB:-value_copilot}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-value_copilot}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - vc-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-value_copilot}:${POSTGRES_PASSWORD:-value_copilot}@postgres:5432/${POSTGRES_DB:-value_copilot}
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
      - vc-scratchpad:/app/.scratchpad
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

volumes:
  vc-postgres-data:
  vc-redis-data:
  vc-scratchpad:
