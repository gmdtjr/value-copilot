services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - vc-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-value_copilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-value_copilot}
      POSTGRES_DB: ${POSTGRES_DB:-value_copilot}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-value_copilot}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - vc-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-value_copilot}:${POSTGRES_PASSWORD:-value_copilot}@postgres:5432/${POSTGRES_DB:-value_copilot}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # --reload 제거. bulk 작업 상태는 현재 프로세스 메모리에 있으므로 단일 worker로 고정.
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  vc-postgres-data:
  vc-redis-data:
